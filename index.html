  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

700-1F7FF, U+1F800-1F80B, U+1F810-1F847, U+1F850-1F859, U+1F860-1F887, U+1F890-1F8AD, U+1F8B0-1F8BB, U+1F8C0-1F8C1, U+1F900-1F90B, U+1F93B, U+1F946, U+1F984, U+1F996, U+1F9E9, U+1FA00-1FA6F, U+1FA70-1FA7C, U+1FA80-1FA89, U+1FA8F-1FAC6, U+1FACE-1FADC, U+1FADF-1FAE9, U+1FAF0-1FAF8, U+1FB00-1FBFF;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Noto Kufi Arabic';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"889b56c7-fa32-4058-98df-14d9102aacd4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Noto Kufi Arabic';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"c0eb43e2-9a72-4692-b63d-7a728d640449\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   VEOLIA — COLOR TOKENS\n   Usage logic ~60/30/10:  60% white/light · 30% cyan · 10% green+amber\n   Red is reserved for the logo ONLY — never a fill or accent.\n   ============================================================ */\n:root {\n  /* --- Brand core --- */\n  --veolia-cyan: #05c3dd;   /* the hero — water, freshness */\n  --veolia-green: #78be21;  /* environment, living systems */\n  --veolia-amber: #ffac00;  /* energy, emphasis, CTAs */\n  --veolia-red: #ed1c24;    /* LOGO ONLY — do not use as fill/accent */\n\n  /* --- Cyan scale (tints/shades of the hero) --- */\n  --cyan-900: #033a42;\n  --cyan-800: #045a66;\n  --cyan-700: #047d8d;\n  --cyan-600: #05a3b8;\n  --cyan-500: #05c3dd;  /* = --veolia-cyan */\n  --cyan-400: #3dd2e6;\n  --cyan-300: #7ce0ef;\n  --cyan-200: #b3edf6;\n  --cyan-100: #ddf6fb;\n  --cyan-050: #f0fbfd;\n\n  /* --- Green scale --- */\n  --green-700: #4e7d12;\n  --green-600: #63a019;\n  --green-500: #78be21;  /* = --veolia-green */\n  --green-300: #aedb6f;\n  --green-100: #e6f4d2;\n\n  /* --- Amber scale --- */\n  --amber-700: #b87c00;\n  --amber-600: #e09700;\n  --amber-500: #ffac00;  /* = --veolia-amber */\n  --amber-300: #ffce5e;\n  --amber-100: #fff0cc;\n\n  /* --- Neutrals (cool greys) --- */\n  --white: #ffffff;\n  --ink: #1a1a1a;        /* body text — near-black, never cold pure black */\n  --ink-navy: #14202b;   /* optional very dark navy alternative */\n  --grey-700: #3d4750;\n  --grey-600: #5a6671;\n  --grey-500: #7c8893;\n  --grey-400: #a4aeb7;\n  --grey-300: #c9d0d6;\n  --grey-200: #e3e8eb;\n  --grey-100: #f1f4f6;\n  --grey-050: #f8fafb;\n\n  /* ============================================================\n     SEMANTIC ALIASES\n     ============================================================ */\n  /* Surfaces */\n  --surface-page: var(--white);\n  --surface-card: var(--white);\n  --surface-muted: var(--grey-050);\n  --surface-brand: var(--veolia-cyan);\n  --surface-brand-soft: var(--cyan-100);\n  --surface-brand-wash: var(--cyan-050);\n  --surface-inverse: var(--cyan-900);\n\n  /* Text */\n  --text-strong: var(--ink);\n  --text-body: var(--ink);\n  --text-muted: var(--grey-600);\n  --text-subtle: var(--grey-500);\n  --text-on-brand: var(--white);\n  --text-on-dark: var(--white);\n  --text-link: var(--cyan-700);\n\n  /* Borders & lines */\n  --border-default: var(--grey-200);\n  --border-strong: var(--grey-300);\n  --border-brand: var(--veolia-cyan);\n  --divider: var(--grey-200);\n\n  /* Accents (use sparingly — one pop per composition) */\n  --accent-primary: var(--veolia-cyan);\n  --accent-green: var(--veolia-green);\n  --accent-amber: var(--veolia-amber);\n\n  /* Feedback */\n  --success: var(--veolia-green);\n  --warning: var(--veolia-amber);\n  --info: var(--veolia-cyan);\n  /* Note: no brand \"error\" red in layouts — use amber for emphasis/warnings.\n     If a true destructive state is unavoidable, use --danger sparingly. */\n  --danger: #d6492f;\n\n  /* Data-viz series (cyan leads; amber + green secondary; grey baseline) */\n  --viz-1: var(--veolia-cyan);\n  --viz-2: var(--veolia-amber);\n  --viz-3: var(--veolia-green);\n  --viz-4: var(--cyan-700);\n  --viz-baseline: var(--grey-300);\n  --viz-grid: var(--grey-200);\n\n  /* Focus ring */\n  --focus-ring: color-mix(in srgb, var(--veolia-cyan) 55%, transparent);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   VEOLIA — TYPOGRAPHY TOKENS\n   One family, many weights. Headlines often UPPERCASE, tight, heavy.\n   Subtitles / dates in italic. Body is clean and neutral.\n   ============================================================ */\n:root {\n  /* Families */\n  --font-display: 'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-body: 'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-arabic: 'Noto Kufi Arabic', 'Archivo', system-ui, sans-serif;\n\n  /* Weights */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n  --fw-extrabold: 800; /* @kind font */\n  --fw-black: 900; /* @kind font */\n\n  /* Fluid type scale (clamped) */\n  --text-display: 800 clamp(3rem, 6vw, 5.25rem)/0.98 var(--font-display);\n  --text-h1: 800 clamp(2.25rem, 4vw, 3.5rem)/1.02 var(--font-display);\n  --text-h2: 800 clamp(1.75rem, 2.6vw, 2.5rem)/1.06 var(--font-display);\n  --text-h3: 700 clamp(1.375rem, 1.8vw, 1.75rem)/1.12 var(--font-display);\n  --text-h4: 700 1.25rem/1.2 var(--font-display);\n  --text-lead: 400 clamp(1.125rem, 1.4vw, 1.375rem)/1.5 var(--font-body);\n  --text-base: 400 1rem/1.6 var(--font-body);\n  --text-sm: 400 0.875rem/1.55 var(--font-body);\n  --text-xs: 500 0.75rem/1.45 var(--font-body);\n\n  /* Standalone size ramp (when font shorthand is too rigid) */\n  --size-2xs: 0.6875rem;\n  --size-xs: 0.75rem;\n  --size-sm: 0.875rem;\n  --size-base: 1rem;\n  --size-lg: 1.125rem;\n  --size-xl: 1.375rem;\n  --size-2xl: 1.75rem;\n  --size-3xl: 2.5rem;\n  --size-4xl: 3.5rem;\n  --size-5xl: 5.25rem;\n\n  /* Line heights */\n  --leading-tight: 1.02; /* @kind other */\n  --leading-snug: 1.2; /* @kind other */\n  --leading-normal: 1.5; /* @kind other */\n  --leading-relaxed: 1.65; /* @kind other */\n\n  /* Letter spacing — headlines set tight; small uppercase set wide */\n  --tracking-tighter: -0.03em; /* @kind other */\n  --tracking-tight: -0.015em; /* @kind other */\n  --tracking-normal: 0; /* @kind other */\n  --tracking-wide: 0.04em; /* @kind other */\n  --tracking-wider: 0.12em; /* @kind other */\n}\n\n/* Convenience utility classes (optional) */\n.u-display { font: var(--text-display); letter-spacing: var(--tracking-tight); text-transform: uppercase; }\n.u-h1 { font: var(--text-h1); letter-spacing: var(--tracking-tight); }\n.u-h2 { font: var(--text-h2); letter-spacing: var(--tracking-tight); }\n.u-h3 { font: var(--text-h3); letter-spacing: var(--tracking-tight); }\n.u-lead { font: var(--text-lead); color: var(--text-muted); }\n.u-eyebrow {\n  font: var(--fw-bold) var(--size-xs)/1 var(--font-display);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-wider);\n  color: var(--cyan-700);\n}\n.u-italic-sub { font-style: italic; font-weight: var(--fw-medium); color: var(--text-muted); }\n<\u002Fstyle>\n  <style>/* ============================================================\n   VEOLIA — SPACING, RADII, SHADOW, MOTION\n   Generous negative space. Large rounded corners. Flat — no heavy\n   shadows or gradients. Calm, structured grids.\n   ============================================================ */\n:root {\n  /* Spacing scale (4px base) */\n  --space-0: 0;\n  --space-1: 0.25rem;   /* 4 */\n  --space-2: 0.5rem;    /* 8 */\n  --space-3: 0.75rem;   /* 12 */\n  --space-4: 1rem;      /* 16 */\n  --space-5: 1.5rem;    /* 24 */\n  --space-6: 2rem;      /* 32 */\n  --space-7: 3rem;      /* 48 */\n  --space-8: 4rem;      /* 64 */\n  --space-9: 6rem;      /* 96 */\n  --space-10: 8rem;     /* 128 */\n\n  /* Layout */\n  --container-max: 1200px; /* @kind spacing */\n  --container-wide: 1440px; /* @kind spacing */\n  --gutter: clamp(1.25rem, 4vw, 4rem); /* @kind spacing */\n  --section-y: clamp(3.5rem, 8vw, 8rem); /* @kind spacing */\n\n  /* Radii — generous, never subtle (the Veolia rounded language) */\n  --radius-xs: 6px;\n  --radius-sm: 10px;\n  --radius-md: 16px;\n  --radius-lg: 24px;\n  --radius-xl: 32px;\n  --radius-2xl: 44px;\n  --radius-pill: 999px;\n  --radius-card: var(--radius-lg);\n  --radius-image: var(--radius-xl);\n\n  /* Shadows — flat brand: shadows are minimal. Prefer borders / tint\n     fields over elevation. These are intentionally soft & rare. */\n  --shadow-none: none;\n  --shadow-xs: 0 1px 2px rgba(20, 32, 43, 0.05);\n  --shadow-sm: 0 4px 14px rgba(5, 90, 102, 0.06);\n  --shadow-md: 0 12px 32px rgba(5, 90, 102, 0.08);\n  --shadow-brand: 0 18px 40px rgba(5, 195, 221, 0.18);\n\n  /* Borders */\n  --border-width: 1px; /* @kind other */\n  --border-width-strong: 1.5px; /* @kind other */\n\n  /* Motion — calm, no bounce. Fades + gentle eases. */\n  --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.45, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 140ms; /* @kind other */\n  --dur-base: 240ms; /* @kind other */\n  --dur-slow: 420ms; /* @kind other */\n  --transition-base: all var(--dur-base) var(--ease-out); /* @kind other */\n\n  /* Z-index */\n  --z-base: 0; /* @kind other */\n  --z-sticky: 100; /* @kind other */\n  --z-overlay: 800; /* @kind other */\n  --z-modal: 1000; /* @kind other */\n  --z-toast: 1100; /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   VEOLIA — BASE ELEMENTS & BRAND UTILITIES\n   Lightweight resets + the signature wave/curve motif helpers.\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font: var(--text-base);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  margin: 0 0 0.5em;\n  letter-spacing: var(--tracking-tight);\n  text-wrap: balance;\n}\nh1 { font: var(--text-h1); }\nh2 { font: var(--text-h2); }\nh3 { font: var(--text-h3); }\nh4 { font: var(--text-h4); }\n\np { margin: 0 0 1em; text-wrap: pretty; }\na { color: var(--text-link); text-decoration: none; }\na:hover { text-decoration: underline; }\n\n:focus-visible {\n  outline: 3px solid var(--focus-ring);\n  outline-offset: 2px;\n  border-radius: var(--radius-xs);\n}\n\n/* RTL / Arabic support: set dir=\"rtl\" lang=\"ar\" on a container */\n[lang=\"ar\"], [dir=\"rtl\"] { font-family: var(--font-arabic); }\n\n/* --- Brand motif helpers --- */\n\n/* A solid cyan field with a soft wave cut into its bottom edge */\n.v-wave-field {\n  position: relative;\n  background: var(--veolia-cyan);\n  color: var(--text-on-brand);\n}\n\n/* Reusable SVG wave divider — drop inside a section as a band.\n   Use a lighter cyan tint layered over cyan for the \"water\" feel. */\n.v-wave {\n  display: block;\n  width: 100%;\n  height: auto;\n  color: var(--cyan-300); /* set to control the wave fill via currentColor */\n}\n\n/* Generic rounded media frame (the Veolia image treatment) */\n.v-frame {\n  border-radius: var(--radius-image);\n  overflow: hidden;\n  display: block;\n}\n.v-frame > img { display: block; width: 100%; height: 100%; object-fit: cover; }\n\n/* Soft cyan wash panel */\n.v-panel-soft {\n  background: var(--surface-brand-soft);\n  border-radius: var(--radius-card);\n}\n\n/* Eyebrow + curve accent under a heading */\n.v-curve-accent {\n  width: , U+1F694, U+1F698, U+1F6AD, U+1F6B2, U+1F6B9-1F6BA, U+1F6BC, U+1F6C6-1F6CF, U+1F6D3-1F6D7, U+1F6E0-1F6EA, U+1F6F0-1F6F3, U+1F6F7-1F6FC, U+1F700-1F7FF, U+1F800-1F80B, U+1F810-1F847, U+1F850-1F859, U+1F860-1F887, U+1F890-1F8AD, U+1F8B0-1F8BB, U+1F8C0-1F8C1, U+1F900-1F90B, U+1F93B, U+1F946, U+1F984, U+1F996, U+1F9E9, U+1FA00-1FA6F, U+1FA70-1FA7C, U+1FA80-1FA89, U+1FA8F-1FAC6, U+1FACE-1FADC, U+1FADF-1FAE9, U+1FAF0-1FAF8, U+1FB00-1FBFF;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Noto Kufi Arabic';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"889b56c7-fa32-4058-98df-14d9102aacd4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Noto Kufi Arabic';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"c0eb43e2-9a72-4692-b63d-7a728d640449\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   VEOLIA — COLOR TOKENS\n   Usage logic ~60/30/10:  60% white/light · 30% cyan · 10% green+amber\n   Red is reserved for the logo ONLY — never a fill or accent.\n   ============================================================ */\n:root {\n  /* --- Brand core --- */\n  --veolia-cyan: #05c3dd;   /* the hero — water, freshness */\n  --veolia-green: #78be21;  /* environment, living systems */\n  --veolia-amber: #ffac00;  /* energy, emphasis, CTAs */\n  --veolia-red: #ed1c24;    /* LOGO ONLY — do not use as fill/accent */\n\n  /* --- Cyan scale (tints/shades of the hero) --- */\n  --cyan-900: #033a42;\n  --cyan-800: #045a66;\n  --cyan-700: #047d8d;\n  --cyan-600: #05a3b8;\n  --cyan-500: #05c3dd;  /* = --veolia-cyan */\n  --cyan-400: #3dd2e6;\n  --cyan-300: #7ce0ef;\n  --cyan-200: #b3edf6;\n  --cyan-100: #ddf6fb;\n  --cyan-050: #f0fbfd;\n\n  /* --- Green scale --- */\n  --green-700: #4e7d12;\n  --green-600: #63a019;\n  --green-500: #78be21;  /* = --veolia-green */\n  --green-300: #aedb6f;\n  --green-100: #e6f4d2;\n\n  /* --- Amber scale --- */\n  --amber-700: #b87c00;\n  --amber-600: #e09700;\n  --amber-500: #ffac00;  /* = --veolia-amber */\n  --amber-300: #ffce5e;\n  --amber-100: #fff0cc;\n\n  /* --- Neutrals (cool greys) --- */\n  --white: #ffffff;\n  --ink: #1a1a1a;        /* body text — near-black, never cold pure black */\n  --ink-navy: #14202b;   /* optional very dark navy alternative */\n  --grey-700: #3d4750;\n  --grey-600: #5a6671;\n  --grey-500: #7c8893;\n  --grey-400: #a4aeb7;\n  --grey-300: #c9d0d6;\n  --grey-200: #e3e8eb;\n  --grey-100: #f1f4f6;\n  --grey-050: #f8fafb;\n\n  /* ============================================================\n     SEMANTIC ALIASES\n     ============================================================ */\n  /* Surfaces */\n  --surface-page: var(--white);\n  --surface-card: var(--white);\n  --surface-muted: var(--grey-050);\n  --surface-brand: var(--veolia-cyan);\n  --surface-brand-soft: var(--cyan-100);\n  --surface-brand-wash: var(--cyan-050);\n  --surface-inverse: var(--cyan-900);\n\n  /* Text */\n  --text-strong: var(--ink);\n  --text-body: var(--ink);\n  --text-muted: var(--grey-600);\n  --text-subtle: var(--grey-500);\n  --text-on-brand: var(--white);\n  --text-on-dark: var(--white);\n  --text-link: var(--cyan-700);\n\n  /* Borders & lines */\n  --border-default: var(--grey-200);\n  --border-strong: var(--grey-300);\n  --border-brand: var(--veolia-cyan);\n  --divider: var(--grey-200);\n\n  /* Accents (use sparingly — one pop per composition) */\n  --accent-primary: var(--veolia-cyan);\n  --accent-green: var(--veolia-green);\n  --accent-amber: var(--veolia-amber);\n\n  /* Feedback */\n  --success: var(--veolia-green);\n  --warning: var(--veolia-amber);\n  --info: var(--veolia-cyan);\n  /* Note: no brand \"error\" red in layouts — use amber for emphasis/warnings.\n     If a true destructive state is unavoidable, use --danger sparingly. */\n  --danger: #d6492f;\n\n  /* Data-viz series (cyan leads; amber + green secondary; grey baseline) */\n  --viz-1: var(--veolia-cyan);\n  --viz-2: var(--veolia-amber);\n  --viz-3: var(--veolia-green);\n  --viz-4: var(--cyan-700);\n  --viz-baseline: var(--grey-300);\n  --viz-grid: var(--grey-200);\n\n  /* Focus ring */\n  --focus-ring: color-mix(in srgb, var(--veolia-cyan) 55%, transparent);\n}\n\n/* ============================================================\n   VEOLIA — TYPOGRAPHY TOKENS\n   One family, many weights. Headlines often UPPERCASE, tight, heavy.\n   Subtitles / dates in italic. Body is clean and neutral.\n   ============================================================ */\n:root {\n  /* Families */\n  --font-display: 'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-body: 'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-arabic: 'Noto Kufi Arabic', 'Archivo', system-ui, sans-serif;\n\n  /* Weights */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n  --fw-extrabold: 800; /* @kind font */\n  --fw-black: 900; /* @kind font */\n\n  /* Fluid type scale (clamped) */\n  --text-display: 800 clamp(3rem, 6vw, 5.25rem)/0.98 var(--font-display);\n  --text-h1: 800 clamp(2.25rem, 4vw, 3.5rem)/1.02 var(--font-display);\n  --text-h2: 800 clamp(1.75rem, 2.6vw, 2.5rem)/1.06 var(--font-display);\n  --text-h3: 700 clamp(1.375rem, 1.8vw, 1.75rem)/1.12 var(--font-display);\n  --text-h4: 700 1.25rem/1.2 var(--font-display);\n  --text-lead: 400 clamp(1.125rem, 1.4vw, 1.375rem)/1.5 var(--font-body);\n  --text-base: 400 1rem/1.6 var(--font-body);\n  --text-sm: 400 0.875rem/1.55 var(--font-body);\n  --text-xs: 500 0.75rem/1.45 var(--font-body);\n\n  /* Standalone size ramp (when font shorthand is too rigid) */\n  --size-2xs: 0.6875rem;\n  --size-xs: 0.75rem;\n  --size-sm: 0.875rem;\n  --size-base: 1rem;\n  --size-lg: 1.125rem;\n  --size-xl: 1.375rem;\n  --size-2xl: 1.75rem;\n  --size-3xl: 2.5rem;\n  --size-4xl: 3.5rem;\n  --size-5xl: 5.25rem;\n\n  /* Line heights */\n  --leading-tight: 1.02; /* @kind other */\n  --leading-snug: 1.2; /* @kind other */\n  --leading-normal: 1.5; /* @kind other */\n  --leading-relaxed: 1.65; /* @kind other */\n\n  /* Letter spacing — headlines set tight; small uppercase set wide */\n  --tracking-tighter: -0.03em; /* @kind other */\n  --tracking-tight: -0.015em; /* @kind other */\n  --tracking-normal: 0; /* @kind other */\n  --tracking-wide: 0.04em; /* @kind other */\n  --tracking-wider: 0.12em; /* @kind other */\n}\n\n/* Convenience utility classes (optional) */\n.u-display { font: var(--text-display); letter-spacing: var(--tracking-tight); text-transform: uppercase; }\n.u-h1 { font: var(--text-h1); letter-spacing: var(--tracking-tight); }\n.u-h2 { font: var(--text-h2); letter-spacing: var(--tracking-tight); }\n.u-h3 { font: var(--text-h3); letter-spacing: var(--tracking-tight); }\n.u-lead { font: var(--text-lead); color: var(--text-muted); }\n.u-eyebrow {\n  font: var(--fw-bold) var(--size-xs)/1 var(--font-display);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-wider);\n  color: var(--cyan-700);\n}\n.u-italic-sub { font-style: italic; font-weight: var(--fw-medium); color: var(--text-muted); }\n\n/* ============================================================\n   VEOLIA — SPACING, RADII, SHADOW, MOTION\n   Generous negative space. Large rounded corners. Flat — no heavy\n   shadows or gradients. Calm, structured grids.\n   ============================================================ */\n:root {\n  /* Spacing scale (4px base) */\n  --space-0: 0;\n  --space-1: 0.25rem;   /* 4 */\n  --space-2: 0.5rem;    /* 8 */\n  --space-3: 0.75rem;   /* 12 */\n  --space-4: 1rem;      /* 16 */\n  --space-5: 1.5rem;    /* 24 */\n  --space-6: 2rem;      /* 32 */\n  --space-7: 3rem;      /* 48 */\n  --space-8: 4rem;      /* 64 */\n  --space-9: 6rem;      /* 96 */\n  --space-10: 8rem;     /* 128 */\n\n  /* Layout */\n  --container-max: 1200px; /* @kind spacing */\n  --container-wide: 1440px; /* @kind spacing */\n  --gutter: clamp(1.25rem, 4vw, 4rem); /* @kind spacing */\n  --section-y: clamp(3.5rem, 8vw, 8rem); /* @kind spacing */\n\n  /* Radii — generous, never subtle (the Veolia rounded language) */\n  --radius-xs: 6px;\n  --radius-sm: 10px;\n  --radius-md: 16px;\n  --radius-lg: 24px;\n  --radius-xl: 32px;\n  --radius-2xl: 44px;\n  --radius-pill: 999px;\n  --radius-card: var(--radius-lg);\n  --radius-image: var(--radius-xl);\n\n  /* Shadows — flat brand: shadows are minimal. Prefer borders / tint\n     fields over elevation. These are intentionally soft & rare. */\n  --shadow-none: none;\n  --shadow-xs: 0 1px 2px rgba(20, 32, 43, 0.05);\n  --shadow-sm: 0 4px 14px rgba(5, 90, 102, 0.06);\n  --shadow-md: 0 12px 32px rgba(5, 90, 102, 0.08);\n  --shadow-brand: 0 18px 40px rgba(5, 195, 221, 0.18);\n\n  /* Borders */\n  --border-width: 1px; /* @kind other */\n  --border-width-strong: 1.5px; /* @kind other */\n\n  /* Motion — calm, no bounce. Fades + gentle eases. */\n  --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.45, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 140ms; /* @kind other */\n  --dur-base: 240ms; /* @kind other */\n  --dur-slow: 420ms; /* @kind other */\n  --transition-base: all var(--dur-base) var(--ease-out); /* @kind other */\n\n  /* Z-index */\n  --z-base: 0; /* @kind other */\n  --z-sticky: 100; /* @kind other */\n  --z-overlay: 800; /* @kind other */\n  --z-modal: 1000; /* @kind other */\n  --z-toast: 1100; /* @kind other */\n}\n\n/* ============================================================\n   VEOLIA — BASE ELEMENTS ccent under a heading */\n.v-curve-accent {\n  width: 64px; height: 6px;\n  border-radius: var(--radius-pill);\n  background: var(--veolia-cyan);\n}\n\n<\u002Fstyle>\n  <script src=\"505b54a3-5361-4a5a-be1f-0978bcf08b71\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: var(--grey-100); }\n    @keyframes vFadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }\n    @keyframes vPulse { 0% { transform: scale(1); opacity: .8; } 70% { transform: scale(2.6); opacity: 0; } 100% { transform: scale(2.6); opacity: 0; } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-export-root=\"true\" style=\"width:1920px;height:1080px;display:flex;background:var(--grey-050);font-family:var(--font-body);color:var(--text-body);overflow:hidden\">\n\n  <!-- ============ SIDEBAR ============ -->\n  <nav style=\"width:96px;flex:0 0 96px;background:var(--cyan-900);display:flex;flex-direction:column;align-items:center;padding:22px 0 26px;gap:10px\">\n    <div style=\"width:48px;height:48px;border-radius:16px;background:var(--veolia-cyan);display:flex;align-items:center;justify-content:center;margin-bottom:18px\">\n      <svg viewBox=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <sc-for list=\"{{ nav }}\" as=\"n\" hint-placeholder-count=\"5\">\n      <div onclick=\"{{ n.onClick }}\" style=\"width:72px;padding:12px 0 10px;border-radius:16px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;background:{{ n.bg }};transition:background .25s ease\">\n        <svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"{{ n.color }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <sc-for list=\"{{ n.paths }}\" as=\"p\" ergy recovery rate<\u002Fspan>\n                <\u002Fdiv>\n                <span style=\"font-size:14px;color:var(--text-muted)\">live share of waste received at Sharjah WtE converted to energy<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1.3;background:var(--surface-card);border:1px solid var(--border-default);border-radius:22px;padding:22px 28px;display:flex;flex-direction:column;justify-content:center;gap:16px;animation:vFadeUp .5s ease-out both;animation-delay:.44s\">\n              <sc-for list=\"{{ es.equiv }}\" as=\"q\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:16px\">\n                  <div style=\"width:42px;height:42px;border-radius:13px;background:var(--cyan-100);display:flex;align-items:center;justify-content:center;flex:0 0 42px\">\n                    <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"var(--cyan-700)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><sc-for list=\"{{ q.paths }}\" as=\"p\" hint-placeholder-count=\"1\"><path d=\"{{ p }}\"><\u002Fpath><\u002Fsc-for><\u002Fsvg>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column\">\n                    <span style=\"font-size:22px;font-weight:800;color:var(--text-strong)\">{{ q.v }}<\u002Fspan>\n                    <span style=\"font-size:13px;color:var(--text-muted)\">{{ q.l }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;autoRotate&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Kiosk&quot;},&quot;rotateSecs&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:20,&quot;min&quot;:8,&quot;max&quot;:60,&quot;step&quot;:1,&quot;unit&quot;:&quot;s&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Kiosk&quot;},&quot;gridFactor&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:0.45,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;ESG assumptions&quot;},&quot;liveDailyTonnes&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1034,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Live counter&quot;}}\">\nclass Component extends DCLogic {\n  state = { page: 'overview', prog: 0, rotPct: 0, mFrac: null, dFrac: null, ratioW: 0 };\n\n  componentDidMount() {\n    this.startAnim();\n\n    // ---- live projection engine ----\n    // acc[cad] is the smoothed fraction (0..1) of the current period elapsed.\n    // Every headline metric = periodTotal * acc[cadence]. Daily counters reset\n    // at midnight; monthly counters roll over at month-end — handled naturally\n    // because clockFrac() drops back toward 0 when the period turns over.\n    this.acc = { day: this.clockFrac('day'), month: this.clockFrac('month') };\n    this.jit = { day: 1, month: 1 };   // ±2% speed wobble per cadence\n    this.rwalk = 0;                    // small random walk for ratio/percentage metrics\n    this.lastTick = Date.now();\n\n    const roll = () => {               // re-roll jitter every 6–10s (not robotic)\n      this.jit = { day: 0.98 + Math.random() * 0.04, month: 0.98 + Math.random() * 0.04 };\n      this.jitterTimer = setTimeout(roll, 6000 + Math.random() * 4000);\n    };\n    roll();\n\n    this.liveTimer = setInterval(() => {\n      const now = Date.now();\n      const dt = Math.min(1, (now - this.lastTick) / 1000);\n      this.lastTick = now;\n      ['day', 'month'].forEach((cad) => {\n        const rate = 1 / this.periodSecs(cad);      // fraction gained per second\n        const base = this.clockFrac(cad);           // true fraction elapsed now\n        if (base < this.acc[cad] - 0.02) this.acc[cad] = base;   // period rollover\n        this.acc[cad] += rate * this.jit[cad] * dt;              // smooth increment\n        this.acc[cad] += (base - this.acc[cad]) * 0.02;          // gentle pull to true\n      });\n      // ratio metrics (gauges, %, yield) wobble ±~0.4% around their true value\n      this.rwalk = this.rwalk * 0.96 + (Math.random() - 0.5) * 0.0009;\n      this.rwalk = Math.max(-0.004, Math.min(0.004, this.rwalk));\n      this.setState({ mFrac: this.acc.month, dFrac: this.acc.day, ratioW: this.rwalk });\n    }, 150);\n\n    // ---- kiosk auto-rotation ----\n    this.rotStart = Date.now();\n    this.timer = setInterval(() => {\n      const secs = this.props.rotateSecs ?? 20;\n      const auto = this.props.autoRotate ?? true;\n      const el = (Date.now() - this.rotStart) / (secs * 1000);\n      if (auto && el >= 1) {\n        const order = ['overview', 'waste', 'water', 'energy', 'esg'];\n        const next = order[(order.indexOf(this.state.page) + 1) % order.length];\n        this.go(next);\n      } else {\n        this.setState({ rotPct: Math.min(1, el) });\n      }\n    }, 200);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this.timer);\n    clearInterval(this.liveTimer);\n    clearTimeout(this.jitterTimer);\n    cancelAnimationFrame(this.raf);\n  }\n\n  clockFrac(cad) {\n    const now = new Date();\n    if (cad === 'day') {\n      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());\n      return (now - start) / 86400000;\n    }\n    const start = new Date(now.getFullYear(), now.getMonth(), 1);\n    const next = new Date(now.getFullYear(), now.getMonth() + 1, 1);\n    return (now - start) / (next - start);\n  }\n\n  periodSecs(cad) {\n    const now = new Date();\n    if (cad === 'day') return 86400;\n    return new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() * 86400;\n  }\n\n  startAnim() {\n    cancelAnimationFrame(this.raf);\n    const t0 = performance.now();\n    const step = (t) => {\n      const p = Math.min(1, (t - t0) / 1700);\n      this.setState({ prog: p });\n      if (p < 1) this.raf = requestAnimationFrame(step);\n    };\n    this.raf = requestAnimationFrame(step);\n  }\n\n  go(id) {\n    this.rotStart = Date.now();\n    this.setState({ page: id, prog: 0, rotPct: 0 });\n    this.startAnim();\n  }\n\n  fmt(n, d = 0) {\n    return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });\n  }\n\n  linePath(vals, max, min) {\n    const n = vals.length;\n    const pts = vals.map((v, i) => {\n      const x = (i / (n - 1)) * 1000;\n      const y = 280 - ((v - min) / (max - min)) * 240;\n      return [x, y];\n    });\n    const path = 'M' + pts.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L');\n    const area = path + ' L1000 280 L0 280 Z';\n    return { path, area };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const e = 1 - Math.pow(1 - s.prog, 3); // easeOutCubic load-in\n    const fmt = this.fmt.bind(this);\n    const gf = this.props.gridFactor ?? 0.45;\n\n    // live fractions (fall back to clock before first tick)\n    const fM = s.mFrac != null ? s.mFrac : this.clockFrac('month');\n    const fD = s.dFrac != null ? s.dFrac : this.clockFrac('day');\n    const rw = s.ratioW || 0;\n    const lm = (t, d = 2) => fmt(t * fM * e, d);          // monthly period-to-date\n    const ld = (t, d = 2) => fmt(t * fD * e, d);          // daily period-to-date\n    const lr = (p) => p * (1 + rw) * e;                    // live ratio/percentage\n\n    // ---- constants (monthly averages, Sheet1) ----\n    const AVG = { waste: 90971, treated: 31467, waterM: 15430000, energy: 23668, biogas: 925839 };\n    const co2 = Math.round(AVG.energy * gf);\n    const T = {\n      months: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],\n      sharjah: [24981,22380,24371,23909,8390,23647,24004,24067,23388,17869,15502,24511],\n      warsan: [972,2481,3722,2767,0,2637,2554,1942,0,0,0,0],\n      waterM: [14.93,14.07,15.57,13.89,15.03,15.17,14.95,15.27,15.81,16.64,15.89,15.79],\n      wasteKt: [108.1,90.2,94.7,94.3,86.5,42.8,98.0,93.7,90.1,81.0,74.0,79.0]\n    };\n    const energyTot = T.sharjah.map((v, i) => v + T.warsan[i]);\n\n    // ---- nav ----\n    const ICONS = {\n      overview: ['M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z', 'M9 22V12h6v10'],\n      waste: ['M3 6h18', 'M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6', 'M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2', 'M10 11v6', 'M14 11v6'],\n      water: ['M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z'],\n      energy: ['M13 2L3 14h9l-1 8 10-12h-9l1-8z'],\n      esg: ['M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z', 'M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12']\n    };\n    const PAGES = [\n      { id: 'overview', label: 'Overview', title: 'UAE Operations Overview' },\n      { id: 'waste', label: 'Waste', title: 'Waste — Contract Breakdown' },\n      { id: 'water', label: 'Water', title: 'Water — Contract Breakdown' },\n      { id: 'energy', label: 'Energy', title: 'Energy — Contract Breakdown' },\n      { id: 'esg', label: 'ESG', title: 'ESG & Sustainability Impact' }\n    ];\n    const nav = PAGES.map(p => ({\n      id: p.id, label: p.label, paths: ICONS[p.id],\n      bg: s.page === p.id ? 'var(--veolia-cyan)' : 'transparent',\n      color: s.page === p.id ? '#ffffff' : 'var(--cyan-400)',\n      onClick: () => this.go(p.id)\n    }));\n    const dots = PAGES.map(p => ({\n      w: s.page === p.id ? '34px' : '8px',\n      fill: s.page === p.id ? (s.rotPct * 100).toFixed(1) + '%' : '0%',\n      onClick: () => this.go(p.id)\n    }));\n    const cur = PAGES.find(p => p.id === s.page);\n\n    // ---- overview ----\n    const eLine = this.linePath(energyTot, 30000, 0);\n    const donutData = [\n      { name: 'Municipal & recycling', v: 60078, color: 'var(--veolia-cyan)' },\n      { name: 'Waste to energy', v: 26786, color: 'var(--veolia-amber)' },\n      { name: 'Hazardous', v: 4108, color: 'var(--veolia-green)' }\n    ];\n    const dTot = donutData.reduce((a, b) => a + b.v, 0);\n    let acc = 0;\n    const donut = donutData.map(d => {\n      const len = (d.v / dTot) * 100;\n      const seg = { color: d.color, dash: (len * e).toFixed(2) + ' 100', off: (-acc * e).toFixed(2) };\n      acc += len;\n      return seg;\n    });\n    const ov = {\n      heroes: [\n        { label: 'Total waste handled', value: lm(AVG.waste, 2), unit: 't · this month', sub: 'collected & received · rolls over at month-end', paths: ICONS.waste, delay: '0s' },\n        { label: 'Wastewater treated', value: lm(AVG.waterM, 0), unit: 'm³ · this month', sub: '4 treatment plants + Ajman network · 3 emirates', paths: ICONS.water, delay: '.06s' },\n        { label: 'Clean energy generated', value: lm(AVG.energy, 2), unit: 'MWh · this month', sub: 'Sharjah Waste to Energy + Warsan Biogas', paths: ICONS.energy, delay: '.12s' }\n      ],\n      energyPath: eLine.path, energyArea: eLine.area,\n      donut,\n      donutLegend: donutData.map(d => ({ name: d.name, color: d.color, pct: ((d.v / dTot) * 100).toFixed(0) + '%' })),\n      wasteShort: lm(AVG.waste, 0),\n      gaugeDash: (lr(96.4) / 100).toFixed(3) + ' 1',\n      gaugeVal: lr(96.4).toFixed(1) + '%',\n      liveVal: ld(this.props.liveDailyTonnes ?? 1034, 2),\n      liveDaily: fmt(this.props.liveDailyTonnes ?? 1034),\n      minis: [\n        { label: 'Biogas received', value: lm(AVG.biogas, 1), unit: 'Nm³ · MTD', sub: 'Warsan Biogas to Energy Plant', live: true, delay: '.4s' },\n        { label: 'CO₂e avoided', value: lm(co2, 2), unit: 't · MTD', sub: 'estimated via energy recovery *', live: true, delay: '.46s' },\n        { label: 'Operating sites', value: fmt(10 * e), unit: 'facilities', sub: 'Dubai · Sharjah · Ajman · Abu Dhabi · Al Ain', live: false, delay: '.52s' },\n        { label: 'Hazardous waste treated', value: lm(2443, 2), unit: 't · MTD', sub: 'Jebel Ali · Magma Beaat · Magma Norm', live: true, delay: '.58s' }\n      ]\n    };\n\n    // ---- waste ----\n    const CONTRACTS = [\n      { name: 'VMER — Veolia Middle East Recycling', v: 54546, sub: '2,968 t recycled / mo' },\n      { name: 'Sharjah Waste to Energy', v: 26786, sub: '25,816 t treated · 21,279 MWh' },\n      { name: 'VESE — General Solid Waste', v: 5532, sub: '240 t recycled / mo' },\n      { name: 'Magma Beaat', v: 3235, sub: '1,603 t incinerated / mo' },\n      { name: 'Jebel Ali Liquid Hazardous Waste', v: 802, sub: '822 t treated / mo' },\n      { name: 'Magma Norm', v: 72, sub: '18 t incinerated / mo' }\n    ];\n    const maxC = CONTRACTS[0].v;\n    const maxKt = Math.max(...T.wasteKt);\n    const wa = {\n      bars: CONTRACTS.map(c => ({ name: c.name, sub: c.sub, val: lm(c.v, 1), w: ((c.v / maxC) * 100 * e).toFixed(1) + '%' })),\n      haz: [\n        { name: 'Jebel Ali Liquid HW', a: '802 t received', b: '822 t treated' },\n        { name: 'Magma Beaat', a: '1,603 t incinerated', b: '1,631 t landfilled' },\n        { name: 'Magma Norm', a: '18 t incinerated', b: '54 t landfilled' }\n      ],\n      rec: [\n        { name: 'VMER', t: lm(2968, 1) + ' t', pctLabel: '5.4%', w: (5.4 / 8 * 100 * e).toFixed(1) + '%' },\n        { name: 'VESE (Gen. Waste)', t: lm(240, 1) + ' t', pctLabel: '4.3%', w: (4.3 / 8 * 100 * e).toFixed(1) + '%' }\n      ],\n      cols: T.wasteKt.map((v, i) => ({\n        val: fmt(v, 0), label: T.months[i],\n        h: ((v / maxKt) * 170 * e).toFixed(0) + 'px',\n        color: v === maxKt ? 'var(--veolia-amber)' : 'var(--veolia-cyan)'\n      })),\n      gaugeDash: (lr(34.6) / 100).toFixed(3) + ' 1',\n      gaugeVal: lr(34.6).toFixed(1) + '%'\n    };\n\n    // ---- water ----\n    const WSITES = [\n      { name: 'Al Wathba — Abu Dhabi ISTP2', v: 7324024, pct: 47 },\n      { name: 'Allahamah — Al Ain ISTP2', v: 3440589, pct: 22 },\n      { name: 'Moalajah Ajman 1', v: 2851647, pct: 19 },\n      { name: 'Moalajah Ajman 2', v: 1812610, pct: 12 }\n    ];\n    const wLine = this.linePath(T.waterM, 18, 10);\n    const wt = {\n      total: lm(AVG.waterM, 0),\n      bars: WSITES.map(w => ({ name: w.name, pct: w.pct + '% of total', val: lm(w.v, 0), w: (w.pct / 47 * 100 * e).toFixed(1) + '%' })),\n      path: wLine.path, area: wLine.area,\n      pools: lm(6172, 1),\n      network: lm(4580000, 0)\n    };\n\n    // ---- energy ----\n    const maxE = 30000;\n    const en = {\n      total: lm(AVG.energy, 2),\n      splitS: (89.9 * e).toFixed(1) + '%',\n      splitW: (10.1 * e).toFixed(1) + '%',\n      biogas: lm(AVG.biogas, 1),\n      yield: (2.58 * (1 + rw) * e).toFixed(2),\n      homes: fmt(Math.round(12900 * e / 100) * 100),\n      cols: T.months.map((m, i) => ({\n        label: m, val: fmt(energyTot[i], 0),\n        hS: ((T.sharjah[i] / maxE) * 190 * e).toFixed(0) + 'px',\n        hW: (Math.max(0, (T.warsan[i] / maxE) * 190 * e)).toFixed(0) + 'px'\n      }))\n    };\n\n    // ---- esg ----\n    const es = {\n      co2: lm(co2, 2), co2Year: fmt(co2 * 12), factor: gf,\n      heroes: [\n        { label: 'Waste diverted from landfill', value: lm(AVG.treated, 2), unit: 't · MTD', sub: 'treated, recycled or recovered — ~34.6% of intake', delay: '.08s' },\n        { label: 'Water recovered', value: lm(AVG.waterM, 0), unit: 'm³ · MTD', sub: 'treated wastewater safely returned for reuse', delay: '.14s' },\n        { label: 'Energy recovered', value: lm(AVG.energy, 2), unit: 'MWh · MTD', sub: '90% from waste · 10% from landfill biogas', delay: '.2s' }\n      ],\n      flowIn: [\n        { v: lm(AVG.waste, 1) + ' t', l: 'waste collected & received' },\n        { v: lm(AVG.waterM, 0) + ' m³', l: 'wastewater collected' },\n        { v: lm(AVG.biogas, 1) + ' Nm³', l: 'landfill biogas captured' }\n      ],\n      flowOut: [\n        { v: lm(AVG.energy, 1) + ' MWh', l: 'clean electricity to the grid' },\n        { v: lm(3208, 1) + ' t', l: 'materials recycled back into the economy' },\n        { v: lm(AVG.waterM, 0) + ' m³', l: 'treated water available for reuse' }\n      ],\n      gaugeDash: (lr(96.4) / 100).toFixed(3) + ' 1',\n      gaugeVal: lr(96.4).toFixed(1) + '%',\n      equiv: [\n        { v: fmt(12900 * e) + ' homes', l: 'powered for a year by annual generation', paths: ICONS.overview },\n        { v: fmt(27800 * e) + ' cars', l: 'taken off the road — annualized CO₂e avoided', paths: ['M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2', 'M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0', 'M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0'] },\n        { v: fmt(6172 * e) + ' pools', l: 'Olympic pools of water treated every month', paths: ICONS.water }\n      ]\n    };\n\n    return {\n      nav, dots, months: T.months,\n      pageTitle: cur.title,\n      periodLabel: 'this month to date',\n      isOverview: s.page === 'overview', isWaste: s.page === 'waste', isWater: s.page === 'water',\n      isEnergy: s.page === 'energy', isEsg: s.page === 'esg',\n      chartOp: (0.9 * e).toFixed(2),\n      lineDash: (1 - e).toFixed(3),\n      ov, wa, wt, en, es\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
